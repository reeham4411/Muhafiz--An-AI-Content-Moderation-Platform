version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: content_moderation_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: content_moderation_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Backend connects to Mongo via the Docker service name, not localhost
      - MONGO_URI=mongodb://mongo:27017/content_moderation
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

volumes:
  mongo_data:
  uploads_data:
